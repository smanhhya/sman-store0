<script>
/* =========================
   🔥 Production Version
========================= */

const productsInfo = {
    'super': { name: 'طبق سوبر', price: 100 },
    'jumbo': { name: 'طبق جامبو', price: 110 },
    'special': { name: 'طبق سبشيال', price: 120 },
    'superspecial': { name: 'سوبر سبشيال', price: 130 },
    'eggs': { name: 'بيض سمان', price: 50 },
    'chicks': { name: 'كتاكيت', price: 8 }
};

let globalStock = { 'super': 100, 'jumbo': 50, 'special': 30, 'superspecial': 10, 'eggs': 50, 'chicks': 200 };
let cart = {};

/* =========================
   ✅ Smart Stock System
========================= */
function getAvailableStock(id) {
    const inCart = cart[id]?.quantity || 0;
    return Math.max(0, globalStock[id] - inCart);
}

/* =========================
   Add To Cart
========================= */
function addToCart(id) {
    const available = getAvailableStock(id);

    if (available <= 0) {
        alert("الكمية غير متاحة");
        return;
    }

    if (cart[id]) {
        cart[id].quantity++;
    } else {
        cart[id] = {
            quantity: 1,
            price: productsInfo[id].price,
            name: productsInfo[id].name
        };
    }

    updateUI();
    renderProducts();
}

/* =========================
   Update Quantity
========================= */
function updateQuantity(id, delta) {
    if (!cart[id]) return;

    if (delta === 1) {
        const available = getAvailableStock(id);
        if (available > 0) {
            cart[id].quantity++;
        } else {
            alert("مفيش مخزون كفاية");
        }
    }

    if (delta === -1) {
        cart[id].quantity--;
        if (cart[id].quantity <= 0) delete cart[id];
    }

    updateUI();
    renderProducts();
}

/* =========================
   Render Products
========================= */
function renderProducts() {
    const container = document.getElementById("products-container");
    if (!container) return;

    container.innerHTML = "";

    Object.keys(productsInfo).forEach(id => {
        const item = productsInfo[id];
        const stock = getAvailableStock(id);
        const inCart = cart[id]?.quantity || 0;

        container.innerHTML += `
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h3>${item.name}</h3>
            <p>${item.price} ج</p>
            <p>المتاح: ${stock}</p>

            ${
                inCart > 0 ?
                `
                <button onclick="updateQuantity('${id}',1)">+</button>
                <span>${inCart}</span>
                <button onclick="updateQuantity('${id}',-1)">-</button>
                `
                :
                `<button onclick="addToCart('${id}')">إضافة</button>`
            }
        </div>
        `;
    });
}

/* =========================
   Update UI (Cart)
========================= */
function updateUI() {
    let total = 0;

    Object.values(cart).forEach(item => {
        total += item.quantity * item.price;
    });

    const totalEl = document.getElementById("cart-total");
    if (totalEl) totalEl.innerText = total;
}

/* =========================
   Checkout Protection
========================= */
async function checkoutWhatsApp() {

    for (let id in cart) {
        if (cart[id].quantity > globalStock[id]) {
            alert("في منتج الكمية بتاعته مش متاحة");
            return;
        }
    }

    alert("تم إرسال الطلب ✅");

    cart = {};
    updateUI();
    renderProducts();
}

/* =========================
   Init
========================= */
document.addEventListener("DOMContentLoaded", () => {
    renderProducts();
});
</script>
